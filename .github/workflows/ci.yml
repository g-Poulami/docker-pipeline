name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: fastqc
            image: docker-pipeline/fastqc:0.12.1
            test: "fastqc --version"
          - service: trimmomatic
            image: docker-pipeline/trimmomatic:0.39
            test: "trimmomatic -version || true"
          - service: bwa
            image: docker-pipeline/bwa:0.7.18
            test_cmd: "--version || true"
          - service: samtools
            image: docker-pipeline/samtools:1.19
            test: "samtools --version | head -1"
          - service: gatk
            image: docker-pipeline/gatk:4.5.0.0
            test: "gatk --version"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: containers/${{ matrix.service }}
          tags: ${{ matrix.image }}
          load: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Test ${{ matrix.service }}
        run: |
          docker run --rm --entrypoint sh ${{ matrix.image }} -c "${{ matrix.test }}"

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

  push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: fastqc
            version: "0.12.1"
          - service: trimmomatic
            version: "0.39"
          - service: bwa
            version: "0.7.18"
          - service: samtools
            version: "1.19"
          - service: gatk
            version: "4.5.0.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: containers/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/g-poulami/docker-pipeline/${{ matrix.service }}:${{ matrix.version }}
            ghcr.io/g-poulami/docker-pipeline/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
